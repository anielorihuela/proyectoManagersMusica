<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Artista</title>
</head>
<body>

    <h1>Editar Artista</h1>

    <form id="formEditarArtista">
        <label>Nombre</label>
        <input type="text" id="nombreArtista"><br><br>

        <label>Género</label>
        <input type="text" id="generoArtista"><br><br>

        <label>Popularidad</label>
        <input type="number" id="popularidad"><br><br>

        <label>Seguidores</label>
        <input type="number" id="seguidores"><br><br>

        <label>IDs de conciertos (separados por coma)</label>
        <input type="text" id="conciertos_ids"><br><br>

        <label>IDs de álbumes (separados por coma)</label>
        <input type="text" id="albumes_ids"><br><br>

        <button type="button" id="btnGuardar">Guardar cambios</button>
    </form>

    <div id="formEditarArtista"></div>

    <script src="scriptEditarArtistas.js"></script>

</body>
</html>
