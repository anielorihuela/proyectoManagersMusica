        <h1>Editar Concierto</h1>

        <div class="container mt-5">
            <div class="card p-4 shadow-sm">
                <form id="formEditarConcierto">
                    <label for="fecha">Fecha</label>
                    <input type="date" id="fecha"><br><br>

                    <label for="venue_id">ID del Venue</label>
                    <input type="text" id="venue_id"><br><br>

                    <label for="costoBoleto">Costo del boleto</label>
                    <input type="number" id="costoBoleto"><br><br>

                    <button type="button" id="btnGuardarConcierto">Guardar cambios</button>
                </form>
