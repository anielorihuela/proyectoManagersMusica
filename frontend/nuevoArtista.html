<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Artista</title>
</head>
<body>

    <button onclick="window.location.href='artistas.html'">
        ← Volver a artistas
    </button>

    <h1>Nuevo Artista</h1>

    <form id="formArtista">
        <label>Nombre del artista</label>
        <input 
            type="text" 
            id="nombre" 
            placeholder="Nombre del artista"
            required
        >
        <br><br>

        <label>Género</label>
        <input 
            type="text" 
            id="genero" 
            placeholder="Género (opcional)"
        >
        <br><br>

        <label>Popularidad</label>
        <input 
            type="number" 
            id="popularidad" 
            placeholder="0-100 (opcional)"
            min="0"
            max="100"
        >
        <br><br>

        <label>Seguidores</label>
        <input 
            type="number" 
            id="seguidores" 
            placeholder="Cantidad de seguidores (opcional)"
            min="0"
        >
        <br><br>

        <button type="submit">Guardar</button>
    </form>

    <p style="margin-top: 20px; color: #666;">
        <em>Nota: Después de crear el artista, podrás agregar álbumes, canciones y conciertos desde la página de artistas.</em>
    </p>

    <script src="scriptNuevoArtista.js"></script>

</body>
</html>
