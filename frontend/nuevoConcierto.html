<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Concierto</title>
</head>
<body>

    <button onclick="window.location.href='conciertos.html'">
        ← Volver a conciertos
    </button>

    <h1>Nuevo Concierto</h1>

    <form id="formConcierto" style="max-width: 500px; margin: 20px auto; padding: 20px;">

        <label>Venue (Lugar)</label>
        <select id="venue_id" required>
            <option value="">Seleccionar venue...</option>
        </select>
        <br><br>

        <label>Fecha</label>
        <input type="date" id="fecha" required>
        <br><br>

        <label>Costo del Boleto</label>
        <input type="number" id="costoBoleto" placeholder="Costo en pesos" required min="0">
        <br><br>

        <button type="submit">Guardar</button>
    </form>

    <script src="scriptNuevoConcierto.js"></script>

</body>
</html>
